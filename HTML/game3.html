<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game 3</title>
    <link rel="stylesheet" href="../CSS/style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
</head>
</head>
<body>
    <main>
        <header id="heading-other">
            <h1>STARSHIP SALVAGE</h1>
        </header>

        <section id="visuals">
            <div class="video-container">
                <video controls>
                    <source src="../Media/Starship-Salvage-Compresses (1).mp4" type="video/mp4">
                </video>
            </div>
            <div class="snapshots">
                <img src="../Media/Ship1.png" alt="Snapshot 1">
                <img src="../Media/Ship2.png" alt="Snapshot 2">
                <img src="../Media/Ship3.png" alt="Snapshot 3">
                <img src="../Media/Ship4.png" alt="Snapshot 4">
            </div>
        </section>

        <section id="description">
            <p> An astronaut crash lands on an alien planet, Cora Lumen, on a very special day. You must complete quests to fix your
                ship and befriend the aliens on the way. This was a group project, in which I was in charge of the dialogue, quest system and many 
                of the 3D models. [2025 Unity]
            </p>
        </section>
    </main>
</body>
</html>
